version: '3'
services:
  node.omne:
    build:
      context: .
      dockerfile: Dockerfile
    image: omne-node:latest
    container_name: node1.omne
    ports:
      - "3401:3400"
    networks:
      - node_one_omne-net
    volumes:
      - ./app:/app
    labels:
      app: omne-node
      level: blockchain
      role: validator
      tier: backend
      track: continuous
    environment:
      - PYTHONPATH=/app
      - STEWARD_ADDRESS=${STEWARD_ADDRESS}  # Add this line
    stdin_open: true
    tty: true

networks:
  node_one_omne-net:
    external: true